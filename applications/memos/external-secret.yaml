apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: kubernetes-backend-cloud
spec:
  provider:
    kubernetes:
      remoteNamespace: cloud
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: kube-system
          key: ca.crt
      auth:
        serviceAccount:
          name: external-secrets
          namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: memos-db
  namespace: cloud
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: kubernetes-backend-cloud
  target:
    name: memos-db
    creationPolicy: Owner
    template:
      data:
        POSTGRES_URL: "postgres://{{ .LOGIN }}:{{ .PASSWORD }}@{{ .HOSTNAME }}:{{ .PORT }}/{{ .DATABASE_NAME }}?sslmode=disable"
  data:
    - secretKey: LOGIN
      remoteRef:
        key: database-memos-user-memos-user
        property: LOGIN
    - secretKey: PASSWORD
      remoteRef:
        key: database-memos-user-memos-user
        property: PASSWORD
    - secretKey: HOST
      remoteRef:
        key: database-memos-user-memos-user
        property: HOST
    - secretKey: HOSTNAME
      remoteRef:
        key: database-memos-user-memos-user
        property: HOSTNAME
    - secretKey: PORT
      remoteRef:
        key: database-memos-user-memos-user
        property: PORT
    - secretKey: DATABASE_NAME
      remoteRef:
        key: database-memos-user-memos-user
        property: DATABASE_NAME
