apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent
  namespace: media
spec:
  parentRefs:
    - name: gateway-external
      namespace: network
      sectionName: https
  hostnames:
    - qbittorrent.saleem.us
  rules:
    - backendRefs:
        - name: qbittorrent
          port: 8080
          weight: 1
