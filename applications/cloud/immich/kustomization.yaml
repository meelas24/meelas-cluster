apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloud
resources:
  - namespace.yaml
  - pvc.yaml
  - database.yaml
  - secret.sops.yaml
helmCharts:
  - name: immich
    repo: oci://ghcr.io/immich-app/immich-charts/immich
    version: 0.12.0
    releaseName: immich
    namespace: cloud
    valuesFile: immich-values.yaml
    includeCRDs: false
commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"
