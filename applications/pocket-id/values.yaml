controllers:
  main:
    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
    containers:
      app:
        image:
          repository: ghcr.io/pocket-id/pocket-id
          tag: v2.8.0
        env:
          APP_URL: https://pid.saleem.us
          TRUST_PROXY: true
          TZ: America/Denver
          UPLOAD_PATH: /app/data/uploads
        envFrom:
          - secretRef:
              name: pocket-id-secret
          - secretRef:
              name: pocket-id-db
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              periodSeconds: 5
        resources:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            memory: 256Mi
service:
  app:
    ports:
      http:
        port: 1411

route:
  app:
    hostnames:
      - pid.saleem.us
    parentRefs:
      - name: gateway-external
        namespace: network
        sectionName: https
persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: pocket-id-data
    globalMounts:
      - path: /app/data
