apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: security
resources:
  - namespace.yaml
  - pvc.yaml
  - database.yaml
  - external-secret.yaml
  - dnsendpoint.yaml
  - secret.sops.yaml
helmCharts:
  - name: app-template
    repo: oci://ghcr.io/bjw-s-labs/helm/app-template
    version: 4.6.2
    releaseName: pocket-id
    namespace: security
    valuesFile: values.yaml
    includeCRDs: false
commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"
