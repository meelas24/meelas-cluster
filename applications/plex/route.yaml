apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plex
  namespace: media
spec:
  parentRefs:
    - name: gateway-external
      namespace: network
      sectionName: https
  hostnames:
    - plex.saleem.us
  rules:
    - backendRefs:
        - name: plex
          port: 32400
          weight: 1
