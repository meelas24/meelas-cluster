  name: sonarr
  namespace: media
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  endpoints:
    - dnsName: sonarr.saleem.us
      recordType: CNAME
      targets:
        - external.saleem.us
