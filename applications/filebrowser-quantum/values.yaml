controllers:
  main:
    containers:
      app:
        image:
          repository: gtstef/filebrowser
          tag: stable
        command:
          - /bin/sh
          - -c
          - |
            cp /home/filebrowser/data/config.yaml /tmp/config.yaml
            sed -i "s/__OIDC_CLIENT_SECRET__/$OIDC_CLIENT_SECRET/g" /tmp/config.yaml
            exec ./filebrowser --config=/tmp/config.yaml
        env:
          TZ: America/Denver
          OIDC_CLIENT_SECRET:
            valueFrom:
              secretKeyRef:
                name: filebrowser-oidc-secret
                key: OIDC_CLIENT_SECRET
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /health
            port: 80
          readiness:
            enabled: true
            type: HTTP
            path: /health
            port: 80
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 1Gi

service:
  app:
    controller: main
    ports:
      http:
        port: 80

persistence:
  config:
    type: configMap
    name: filebrowser-config
    globalMounts:
      - path: /home/filebrowser/data/config.yaml
        subPath: config.yaml
        readOnly: true
  data:
    type: persistentVolumeClaim
    existingClaim: filebrowser-data
    globalMounts:
      - path: /data
