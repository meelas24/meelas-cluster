apiVersion: v1
kind: ConfigMap
metadata:
  name: filebrowser-config
  namespace: cloud
data:
  config.yaml: |
    server:
      port: 80
      baseURL: "/"
      cacheDir: /home/filebrowser/data/tmp
      sources:
        - path: /data
          config:
            defaultEnabled: true

    auth:
      methods:
        password:
          enabled: true
        oidc:
          enabled: true
          clientId: 99672b96-afe2-4f45-837b-eb94ad5282fb
          clientSecret: __OIDC_CLIENT_SECRET__
          issuerUrl: https://pid.saleem.us
          scopes: email openid profile groups
          userIdentifier: preferred_username
          disableVerifyTLS: false
          createUser: true
          adminGroup: filebrowser_admin

    userDefaults:
      darkMode: true
      permissions:
        admin: false
        modify: true
        share: true
        download: true
        create: true
        delete: true
