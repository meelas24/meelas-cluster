apiVersion: v1
kind: ConfigMap
metadata:
  name: filebrowser-config
  namespace: cloud
data:
  config.yaml: |
    server:
      port: 80
      baseURL: "/"
      database: /home/filebrowser/data/db/database.db
      cacheDir: /home/filebrowser/data/tmp
      sources:
        - path: /files
          config:
            defaultEnabled: true
        - path: /sync
          config:
            defaultEnabled: true

    auth:
      methods:
        password:
          enabled: false
        oidc:
          enabled: true
          issuerUrl: https://pid.saleem.us
          scopes: email openid profile groups
          userIdentifier: preferred_username
          disableVerifyTLS: false
          createUser: true
          adminGroup: filebrowser_admin

    userDefaults:
      darkMode: true
      permissions:
        admin: false
        modify: true
        share: true
        download: true
        create: true
        delete: true
