apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloud
resources:
  - namespace.yaml
  - configmap.yaml
  - secret.sops.yaml
  - pvc.yaml
  - dnsendpoint.yaml
  - httproute.yaml
helmCharts:
  - name: app-template
    repo: https://bjw-s-labs.github.io/helm-charts
    version: 3.7.3
    releaseName: filebrowser-quantum
    namespace: cloud
    valuesFile: values.yaml
    includeCRDs: false
commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"
