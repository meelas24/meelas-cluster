apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: syncthing
  namespace: cloud
spec:
  parentRefs:
    - name: gateway-external
      namespace: network
      sectionName: https
  hostnames:
    - sync.saleem.us
  rules:
    - backendRefs:
        - name: syncthing
          port: 8384
          weight: 1
