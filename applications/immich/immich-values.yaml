controllers:
  main:
    containers:
      main:
        image:
          tag: v2.6.3
        env:
          REDIS_HOSTNAME: dragonfly.databases.svc.cluster.local
          REDIS_PORT: "6379"
          IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning.cloud:3003

server:
  controllers:
    main:
      containers:
        main:
          env:
            DB_HOSTNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-db-immich-user
                  key: HOST
            DB_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-db-immich-user
                  key: LOGIN
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-db-immich-user
                  key: PASSWORD
            DB_DATABASE_NAME:
              valueFrom:
                secretKeyRef:
                  name: immich-db-immich-user
                  key: DATABASE_NAME
            DB_PORT:
              valueFrom:
                secretKeyRef:
                  name: immich-db-immich-user
                  key: PORT

machine-learning:
  persistence:
    cache:
      enabled: true
      size: 10Gi
      type: emptyDir

immich:
  persistence:
    library:
      existingClaim: immich-media

valkey:
  enabled: false
