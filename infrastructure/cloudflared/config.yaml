tunnel: rpi5
credentials-file: /etc/cloudflared/credentials/credentials.json
metrics: 0.0.0.0:2000
no-autoupdate: true
protocol: http2
loglevel: debug
transport-loglevel: debug

originRequest:
  noTLSVerify: true
  http2Origin: false

ingress:
  - hostname: argocd.saleem.us
    service: http://argocd-server.argocd.svc.cluster.local:80
  - hostname: photos.saleem.us
    service: http://immich-server.cloud.svc.cluster.local:2283
  - hostname: headlamp.saleem.us
    service: http://headlamp.management.svc.cluster.local:80
  - hostname: pid.saleem.us
    service: http://pocket-id.security.svc.cluster.local:1411
  - hostname: files.saleem.us
    service: http://filebrowser-quantum.cloud.svc.cluster.local:80
  - hostname: memos.saleem.us
    service: http://memos.cloud.svc.cluster.local:5230
  - hostname: sync.saleem.us
    service: http://syncthing.cloud.svc.cluster.local:8384
  - hostname: plex.saleem.us
    service: http://plex.media.svc.cluster.local:32400
  - hostname: sonarr.saleem.us
    service: http://sonarr.media.svc.cluster.local:8989
  - hostname: radarr.saleem.us
    service: http://radarr.media.svc.cluster.local:7878
  - hostname: prowlarr.saleem.us
    service: http://prowlarr.media.svc.cluster.local:9696
  - hostname: qbittorrent.saleem.us
    service: http://qbittorrent.media.svc.cluster.local:8080
  - hostname: "*.saleem.us"
    service: http_status:404
  - hostname: saleem.us
    service: http_status:404
  - service: http_status:404
