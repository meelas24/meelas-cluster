---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: networking-apps
  namespace: argocd
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/meelas24/meelas-cluster.git
    targetRevision: HEAD
    path: infrastructure/networking/apps
    plugin:
      name: kustomize-build-with-helm
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
