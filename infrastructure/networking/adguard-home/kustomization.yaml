apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: network

helmCharts:
  - name: app-template
    repo: oci://ghcr.io/bjw-s-labs/helm/app-template
    version: 4.6.2
    releaseName: adguard-home
    namespace: network
    valuesFile: values.yaml
    includeCRDs: false

generatorOptions:
  disableNameSuffixHash: true
