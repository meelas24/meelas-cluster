tunnel: rpi5
credentials-file: /etc/cloudflared/credentials/credentials.json
metrics: 0.0.0.0:2000
no-autoupdate: true
protocol: http2
loglevel: debug
transport-loglevel: debug

originRequest:
  noTLSVerify: true
  http2Origin: false

ingress:
  - hostname: "*.saleem.us"
    service: https://cilium-gateway-gateway-external.gateway.svc.cluster.local
  - hostname: "saleem.us"
    service: https://cilium-gateway-gateway-external.gateway.svc.cluster.local
  - service: http_status:404
