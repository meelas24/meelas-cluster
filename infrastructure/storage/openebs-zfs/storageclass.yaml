apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: zfs-localpv
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: zfs.csi.openebs.io
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
parameters:
  poolName: "Data"
  compression: "lz4"
  fstype: "ext4"
  recordsize: "4K"
