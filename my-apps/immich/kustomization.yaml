apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: immich
resources:
  - namespace.yaml
  - postgres-cluster.yaml
  - library-pvc.yaml
  - httproute.yaml
helmCharts:
  - name: immich
    repo: https://immich-app.github.io/immich-charts
    version: 0.12.0
    releaseName: immich
    namespace: immich
    valuesFile: values.yaml
    includeCRDs: false
